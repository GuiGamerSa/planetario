<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>PlanetAR Detector</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #111; color: #fff; }
  video { display: block; margin-bottom: 10px; border: 2px solid #444; }
  .conf-wrap { width: 300px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .conf-fill { height: 100%; width: 0; background: #0f0; transition: width 0.1s; }
  .conf-fill.high { background: #ff0; }
  .conf-wrap.active { border: 2px solid #0f0; }
</style>
</head>
<body>

<h1>Detector de Maquete PlanetAR</h1>
<video id="video" autoplay playsinline width="320" height="240"></video>
<div class="conf-wrap" id="confWrap">
  <div class="conf-fill" id="confFill"></div>
</div>
<p id="confPct">0%</p>

<script>
const video = document.getElementById('video');
const confFill = document.getElementById('confFill');
const confPct = document.getElementById('confPct');
const confWrap = document.getElementById('confWrap');

let smoothConf = 0;
const SMOOTH = 0.08;
const DETECT_ON = 0.55;
const DETECT_OFF = 0.45;
const COOLDOWN = 1500;
let lastDetectTime = 0;
let isDetected = false;

// funções de callback
function show(){ isDetected = true; console.log("Maquete detectada!"); }
function hide(){ isDetected = false; console.log("Maquete perdida!"); }

// inicializar webcam
navigator.mediaDevices.getUserMedia({ video: true }).then(stream => video.srcObject = stream);

// função de deteção completa
function detect() {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d', { willReadFrequently: true });

  const W = 160, H = 120; 
  c.width = W; c.height = H;

  const rx = W * 0.15 | 0;
  const ry = H * 0.15 | 0;
  const rw = W * 0.7 | 0;
  const rh = H * 0.7 | 0;

  function loop() {
    try {
      ctx.drawImage(video, 0, 0, W, H);
      const data = ctx.getImageData(rx, ry, rw, rh).data;

      let blue=0, green=0, brown=0, dark=0, total=0;
      const mask=[];

      for (let y=0;y<rh;y+=2){
        for (let x=0;x<rw;x+=2){
          const i=(y*rw+x)*4;
          const r=data[i], g=data[i+1], b=data[i+2];
          let detected=false;
          if(b>70 && b>r*1.15 && b>g*0.95){ blue++; detected=true; }
          else if(g>60 && g>r*0.8 && g>b*0.75){ green++; detected=true; }
          else if(r>90 && g>60 && b<r*0.6){ brown++; detected=true; }
          else if(r<60 && g<60 && b<80){ dark++; detected=true; }
          mask.push(detected?1:0);
          total++;
        }
      }

      const radius = Math.min(rw,rh)/2;
      const centerX = rw/2;
      const centerY = rh/2;
      let countInCircle=0;

      for(let y=0;y<rh;y+=2){
        for(let x=0;x<rw;x+=2){
          const dx=x-centerX, dy=y-centerY;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const idx=(y/2)*(rw/2)+(x/2);
          if(dist<radius*0.95 && mask[idx]) countInCircle++;
        }
      }
      const circleScore = countInCircle/total;

      const bp=blue/total, gp=green/total, brp=brown/total, dp=dark/total;
      let conf=0;

      if(bp+gp+brp+dp>0.35 && circleScore>0.25){
        const diversity=(bp*0.4 + gp*0.3 + brp*0.2 + dp*0.1);
        conf = Math.min(1,(bp+gp+brp+dp)*1.2*diversity*circleScore*2);
      }

      smoothConf = smoothConf*(1-SMOOTH)+conf*SMOOTH;
      const pct=Math.round(smoothConf*100);
      confFill.style.width = pct+'%';
      confPct.textContent = pct+'%';

      confFill.classList.toggle('high', smoothConf>DETECT_ON);
      confWrap.classList.toggle('active', smoothConf>0.15);

      const now = Date.now();
      if(!isDetected && smoothConf>=DETECT_ON && (now-lastDetectTime>COOLDOWN)){
        show();
        lastDetectTime=now;
      } else if(isDetected && smoothConf<DETECT_OFF){
        hide();
      }

    } catch(e){ console.error(e); }
    requestAnimationFrame(loop);
  }
  loop();
}

// iniciar deteção
detect();
</script>
</body>
</html>
