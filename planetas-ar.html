<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planetas AR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<!-- AR.js + A-Frame -->
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.0/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #020818;
  --panel: rgba(2,12,36,0.96);
  --accent: #00d4ff;
  --green: #00ff88;
  --muted: rgba(160,200,255,0.5);
  --border: rgba(0,212,255,0.2);
  --text: #e8f4ff;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Exo 2', sans-serif;
  color: var(--text);
  user-select: none;
}

/* A-Frame canvas ocupa todo o ecrã */
a-scene { display: block; }

/* HUD sempre em cima */
#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(to bottom, rgba(2,8,24,0.88), transparent);
  pointer-events: none;
}
#app-name {
  font-family: 'Orbitron', monospace;
  font-size: .68rem; letter-spacing: .28em; color: var(--muted);
}
#status-badge {
  margin-left: auto;
  font-family: 'Orbitron', monospace; font-size: .55rem; letter-spacing: .14em;
  padding: 4px 10px; border-radius: 2px; border: 1px solid var(--border);
  color: var(--accent); white-space: nowrap;
  transition: color .3s, border-color .3s;
  pointer-events: none;
}
#status-badge.found {
  color: var(--green); border-color: rgba(0,255,136,.45);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Cantos do ecrã */
.sc {
  position: fixed; z-index: 998; pointer-events: none;
  width: 22px; height: 22px;
  border-color: rgba(0,212,255,.35); border-style: solid; border-width: 0;
}
.sc.tl { top:12px; left:12px; border-top-width:1.5px; border-left-width:1.5px; }
.sc.tr { top:12px; right:12px; border-top-width:1.5px; border-right-width:1.5px; }
.sc.bl { bottom:12px; left:12px; border-bottom-width:1.5px; border-left-width:1.5px; }
.sc.br { bottom:12px; right:12px; border-bottom-width:1.5px; border-right-width:1.5px; }

/* ── OVERLAY DE INFO (HTML por cima do AR) ── */
#ar-overlay {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; flex-direction: column;
  background: rgba(2,8,24,.6);
  backdrop-filter: blur(3px);
  opacity: 0; pointer-events: none;
  transition: opacity .35s ease;
}
#ar-overlay.active { opacity: 1; pointer-events: auto; }

/* Botão voltar */
#btn-back {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  background: linear-gradient(to bottom, rgba(2,8,24,.95), transparent);
  border: none; cursor: pointer; color: var(--text); width: 100%;
  font-family: 'Orbitron', monospace; font-size: .7rem; letter-spacing: .18em;
  text-transform: uppercase; text-align: left;
}
#btn-back:active { opacity: .7; }
.back-circle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--accent); flex-shrink: 0;
  background: rgba(0,212,255,.08);
}
.back-label { color: var(--muted); font-size: .62rem; }

/* Header do planeta */
#planet-header {
  display: flex; align-items: center; gap: 14px;
  padding: 4px 20px 16px;
  pointer-events: none;
}
#planet-globe {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  box-shadow: inset -5px -5px 14px rgba(0,0,0,.65);
}
#planet-name {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem; font-weight: 900; letter-spacing: .05em;
}
#planet-type {
  font-size: .62rem; letter-spacing: .2em;
  color: var(--muted); text-transform: uppercase; margin-top: 3px;
}
#planet-detected {
  margin-left: auto;
  font-size: .52rem; letter-spacing: .14em; color: var(--green);
  border: 1px solid rgba(0,255,136,.3); padding: 3px 8px; border-radius: 2px;
  white-space: nowrap; animation: blink .9s ease-in-out infinite alternate;
}

/* Card de informação — sobe do fundo */
#info-card {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
  overflow: hidden;
  transform: translateY(100%);
  transition: transform .4s cubic-bezier(.34,1.28,.64,1);
}
#ar-overlay.active #info-card { transform: translateY(0); }

.pill {
  width: 38px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.15); margin: 10px auto 0;
}
.accent-bar { height: 2px; background: linear-gradient(90deg, var(--accent), #7b6cff); margin: 10px 0 0; }
.desc-text {
  padding: 14px 18px 12px;
  font-size: .8rem; line-height: 1.82;
  color: rgba(200,225,255,.84);
  border-bottom: 1px solid var(--border);
}
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: rgba(0,212,255,.07);
}
.stat { background: var(--panel); padding: 10px 16px; }
.stat-l { font-size: .5rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.stat-v { font-family: 'Orbitron', monospace; font-size: .88rem; font-weight: 700; color: var(--accent); }
.stat-u { font-size: .55rem; color: var(--muted); margin-left: 2px; font-family: 'Exo 2', sans-serif; }

/* Dica inicial */
#scan-hint {
  position: fixed; bottom: 28px; left: 0; right: 0;
  text-align: center; z-index: 998; pointer-events: none;
  font-size: .65rem; letter-spacing: .14em;
  color: rgba(150,200,255,.5);
  animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse { 0%,100%{opacity:.35} 50%{opacity:.9} }

/* Marcador link */
#marker-link {
  position: fixed; bottom: 18px; left: 18px; z-index: 999;
  font-size: .52rem; font-family: 'Orbitron', monospace; letter-spacing: .1em;
  padding: 5px 10px; border: 1px solid var(--border);
  background: rgba(0,0,0,.7); color: var(--muted);
  border-radius: 2px; cursor: pointer; text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
</style>
</head>
<body>

<!-- ══ HUD ══ -->
<div id="hud">
  <span id="app-name">COSMOS AR</span>
  <div id="status-badge">● A PROCURAR MARCADOR</div>
</div>
<div class="sc tl"></div><div class="sc tr"></div>
<div class="sc bl"></div><div class="sc br"></div>

<!-- ══ OVERLAY HTML ══ -->
<div id="ar-overlay">
  <button id="btn-back" onclick="closeOverlay()">
    <div class="back-circle">←</div>
    <span class="back-label">VOLTAR A PROCURAR</span>
  </button>
  <div id="planet-header">
    <div id="planet-globe"></div>
    <div>
      <div id="planet-name">—</div>
      <div id="planet-type">—</div>
    </div>
    <div id="planet-detected">● DETETADO</div>
  </div>
  <div id="info-card">
    <div class="pill"></div>
    <div class="accent-bar"></div>
    <div class="desc-text" id="info-desc">—</div>
    <div class="stats-grid" id="info-stats"></div>
  </div>
</div>

<div id="scan-hint">Aponta para o marcador do planeta</div>
<a id="marker-link" href="marcadores.html" target="_blank">🖨 Marcadores</a>

<!-- ══ A-FRAME SCENE ══ -->
<!--
  aruco marker IDs:
  0 = Terra
  1 = Marte
  2 = Júpiter
  3 = Saturno
  4 = Vénus
  5 = Mercúrio
-->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>
  <!-- Marcador 0 — Terra -->
  <a-marker type="barcode" value="0" id="marker-terra" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: terra"></a-entity>
  </a-marker>

  <!-- Marcador 1 — Marte -->
  <a-marker type="barcode" value="1" id="marker-marte" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: marte"></a-entity>
  </a-marker>

  <!-- Marcador 2 — Júpiter -->
  <a-marker type="barcode" value="2" id="marker-jupiter" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: jupiter"></a-entity>
  </a-marker>

  <!-- Marcador 3 — Saturno -->
  <a-marker type="barcode" value="3" id="marker-saturno" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: saturno"></a-entity>
  </a-marker>

  <!-- Marcador 4 — Vénus -->
  <a-marker type="barcode" value="4" id="marker-venus" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: venus"></a-entity>
  </a-marker>

  <!-- Marcador 5 — Mercúrio -->
  <a-marker type="barcode" value="5" id="marker-mercurio" smooth="true" smoothCount="5">
    <a-entity planet-trigger="planetId: mercurio"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
// ═══════════════════════════════════════════════════════
//  DADOS DOS PLANETAS — edita os textos aqui!
// ═══════════════════════════════════════════════════════
const PLANETS = {

  terra: {
    name: 'Terra',
    type: 'Planeta Rochoso · 3.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #7ac8f0, #1a6eb5 40%, #0a3060)',
    glow: '#4a9eff',
    descricao: 'O nosso lar e único planeta conhecido com vida. 71% da superfície é coberta por oceanos de água líquida. A atmosfera de azoto e oxigénio protege todos os seres vivos das radiações solares.',
    stats: [
      { label: 'Diâmetro',  value: '12.742', unit: 'km'   },
      { label: 'Dist. Sol', value: '149,6M', unit: 'km'   },
      { label: 'Ano',       value: '365',    unit: 'dias' },
      { label: 'Satélites', value: '1',      unit: 'lua'  },
    ],
  },

  marte: {
    name: 'Marte',
    type: 'Planeta Rochoso · 4.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #e87858, #c04020 50%, #601808)',
    glow: '#d4512a',
    descricao: 'O Planeta Vermelho. Tem o maior vulcão do Sistema Solar — o Olympus Mons com 22 km de altura. Possui duas pequenas luas: Fobos e Deimos.',
    stats: [
      { label: 'Diâmetro',  value: '6.779',  unit: 'km'   },
      { label: 'Dist. Sol', value: '227,9M', unit: 'km'   },
      { label: 'Ano',       value: '687',    unit: 'dias' },
      { label: 'Satélites', value: '2',      unit: 'luas' },
    ],
  },

  jupiter: {
    name: 'Júpiter',
    type: 'Gigante Gasoso · 5.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #e8d0a0, #b88040 40%, #705018)',
    glow: '#c8a060',
    descricao: 'O maior planeta do Sistema Solar. A sua Grande Mancha Vermelha é uma tempestade que dura há mais de 350 anos. Tem 95 luas conhecidas.',
    stats: [
      { label: 'Diâmetro',  value: '139.820', unit: 'km'   },
      { label: 'Dist. Sol', value: '778,5M',  unit: 'km'   },
      { label: 'Ano',       value: '11,86',   unit: 'anos' },
      { label: 'Satélites', value: '95',      unit: 'luas' },
    ],
  },

  saturno: {
    name: 'Saturno',
    type: 'Gigante Gasoso · 6.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #f0e090, #c8a828 50%, #806010)',
    glow: '#d4b030',
    descricao: 'Famoso pelos seus magníficos anéis de gelo e rocha. É o menos denso de todos os planetas — flutuaria na água! Tem 146 luas conhecidas.',
    stats: [
      { label: 'Diâmetro',  value: '116.460', unit: 'km'   },
      { label: 'Dist. Sol', value: '1,43B',   unit: 'km'   },
      { label: 'Ano',       value: '29,46',   unit: 'anos' },
      { label: 'Satélites', value: '146',     unit: 'luas' },
    ],
  },

  venus: {
    name: 'Vénus',
    type: 'Planeta Rochoso · 2.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #f5e0a0, #d4a840 50%, #7a5808)',
    glow: '#e8c060',
    descricao: 'O planeta mais quente do Sistema Solar com 462 °C, graças ao efeito de estufa extremo. Roda no sentido inverso dos outros planetas.',
    stats: [
      { label: 'Diâmetro',  value: '12.104', unit: 'km'   },
      { label: 'Dist. Sol', value: '108,2M', unit: 'km'   },
      { label: 'Ano',       value: '225',    unit: 'dias' },
      { label: 'Temp.',     value: '462',    unit: '°C'   },
    ],
  },

  mercurio: {
    name: 'Mercúrio',
    type: 'Planeta Rochoso · 1.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #c4b4a4, #8a7060 50%, #50382c)',
    glow: '#b89880',
    descricao: 'O menor planeta do Sistema Solar. Sem atmosfera significativa, as temperaturas variam de −180 °C à noite a +430 °C durante o dia.',
    stats: [
      { label: 'Diâmetro',  value: '4.879',  unit: 'km'   },
      { label: 'Dist. Sol', value: '57,9M',  unit: 'km'   },
      { label: 'Ano',       value: '88',     unit: 'dias' },
      { label: 'Temp. Máx', value: '430',    unit: '°C'   },
    ],
  },

};

// ═══════════════════════════════════════════════════════
//  COMPONENTE A-FRAME — deteta marcador e mostra overlay
// ═══════════════════════════════════════════════════════
let overlayActive = false;
let hideTimer     = null;

AFRAME.registerComponent('planet-trigger', {
  schema: { planetId: { type: 'string' } },

  init() {
    const marker = this.el.parentEl;
    const id     = this.data.planetId;

    marker.addEventListener('markerFound', () => {
      if (overlayActive) return;
      clearTimeout(hideTimer);
      showOverlay(id);
    });

    marker.addEventListener('markerLost', () => {
      // Espera 1.5s antes de fechar — evita flickering
      hideTimer = setTimeout(() => {
        if (overlayActive) closeOverlay();
      }, 1500);
    });
  },
});

// ═══════════════════════════════════════════════════════
//  OVERLAY HTML
// ═══════════════════════════════════════════════════════
function showOverlay(id) {
  const p = PLANETS[id];
  if (!p) return;
  overlayActive = true;

  document.getElementById('planet-name').textContent = p.name;
  document.getElementById('planet-type').textContent = p.type;
  document.getElementById('info-desc').textContent   = p.descricao;

  const globe = document.getElementById('planet-globe');
  globe.style.background = p.gradient;
  globe.style.boxShadow  = `inset -5px -5px 14px rgba(0,0,0,.65), 0 0 24px ${p.glow}88`;

  document.getElementById('info-stats').innerHTML = p.stats.map(s =>
    `<div class="stat">
      <div class="stat-l">${s.label}</div>
      <div class="stat-v">${s.value}<span class="stat-u">${s.unit}</span></div>
    </div>`
  ).join('');

  document.getElementById('status-badge').textContent = `✓ ${p.name.toUpperCase()}`;
  document.getElementById('status-badge').className   = 'found';
  document.getElementById('scan-hint').style.display  = 'none';

  requestAnimationFrame(() => {
    document.getElementById('ar-overlay').classList.add('active');
  });
}

function closeOverlay() {
  overlayActive = false;
  clearTimeout(hideTimer);
  document.getElementById('ar-overlay').classList.remove('active');
  document.getElementById('status-badge').textContent = '● A PROCURAR MARCADOR';
  document.getElementById('status-badge').className   = '';
  document.getElementById('scan-hint').style.display  = '';
}
</script>
</body>
</html>
