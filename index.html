<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planetas AR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --space: #020818;
  --panel: rgba(3, 14, 40, 0.93);
  --accent: #00d4ff;
  --text: #e8f4ff;
  --muted: rgba(180,210,255,0.55);
  --border: rgba(0,212,255,0.22);
  --green: #00ff88;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Exo 2', sans-serif;
  color: var(--text);
  user-select: none;
}

/* ── VIDEO ── */
#video {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 1;
}
#canvas-detect {
  display: none;
}

/* ── HUD CORNERS ── */
#hud {
  position: fixed; inset: 0; z-index: 3;
  pointer-events: none;
}
.hud-corner {
  position: absolute;
  width: 28px; height: 28px;
  border-color: var(--accent);
  border-style: solid;
  border-width: 0;
  opacity: 0.6;
}
.hud-corner.tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; }
.hud-corner.tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; }
.hud-corner.bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; }
.hud-corner.br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; }

#hud-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(to bottom, rgba(2,8,24,0.85), transparent);
}
#hud-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--muted);
}
#hud-status {
  margin-left: auto;
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  border: 1px solid rgba(0,212,255,0.3);
  padding: 3px 9px;
  border-radius: 2px;
  color: var(--accent);
  font-family: 'Orbitron', monospace;
  transition: color 0.3s, border-color 0.3s;
}
#hud-status.found {
  color: var(--green);
  border-color: rgba(0,255,136,0.4);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── SCAN RETICLE (centro) ── */
#reticle {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4;
  pointer-events: none;
  width: 160px; height: 160px;
}
.ret-ring {
  position: absolute; inset: 0;
  border: 1px dashed rgba(0,212,255,0.35);
  border-radius: 50%;
  animation: retSpin 5s linear infinite;
}
.ret-ring.r2 {
  inset: 14px;
  border-color: rgba(0,212,255,0.18);
  animation-direction: reverse;
  animation-duration: 8s;
}
.ret-cross-h, .ret-cross-v {
  position: absolute;
  background: rgba(0,212,255,0.45);
}
.ret-cross-h { width: 20px; height: 1px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.ret-cross-v { width: 1px; height: 20px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
@keyframes retSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

#reticle-label {
  position: fixed;
  top: calc(50% + 92px);
  left: 50%; transform: translateX(-50%);
  z-index: 4;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  white-space: nowrap;
  pointer-events: none;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* ── OVERLAY AR (aparece em cima do planeta) ── */
#ar-overlay {
  position: fixed; inset: 0; z-index: 5;
  display: none;
  pointer-events: none;
}
#ar-overlay.active { display: block; }

/* Linha que liga o planeta ao painel */
#ar-line-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Ponto de deteção no planeta */
#ar-dot {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 16px var(--accent), 0 0 4px #fff;
  transform: translate(-50%, -50%);
  animation: dotPulse 1.5s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100%{ box-shadow: 0 0 16px var(--accent), 0 0 4px #fff; transform: translate(-50%,-50%) scale(1); }
  50%{ box-shadow: 0 0 28px var(--accent), 0 0 8px #fff; transform: translate(-50%,-50%) scale(1.3); }
}

/* Painel flutuante */
#ar-card {
  position: absolute;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0;
  width: min(290px, 82vw);
  overflow: hidden;
  pointer-events: auto;
  animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes cardIn { from{ opacity:0; transform:scale(0.85) } to{ opacity:1; transform:scale(1) } }

.card-top-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #7b6cff);
}
.card-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.card-planet-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: inset -3px -3px 8px rgba(0,0,0,.5);
}
.card-planet-name {
  font-family: 'Orbitron', monospace;
  font-size: 1rem;
  font-weight: 900;
  letter-spacing: 0.06em;
}
.card-planet-type {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 1px;
}
.card-body {
  padding: 10px 14px;
  font-size: 0.75rem;
  line-height: 1.7;
  color: rgba(200,225,255,0.82);
  border-bottom: 1px solid var(--border);
}
.card-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(0,212,255,0.08);
}
.card-stat {
  background: var(--panel);
  padding: 7px 12px;
}
.card-stat-label {
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.card-stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent);
}
.card-stat-unit {
  font-size: 0.55rem;
  color: var(--muted);
  margin-left: 2px;
  font-family: 'Exo 2', sans-serif;
}
.card-close {
  display: block;
  width: 100%;
  padding: 7px;
  background: none;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Orbitron', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  cursor: pointer;
  transition: color 0.2s;
  text-transform: uppercase;
  pointer-events: auto;
}
.card-close:hover { color: var(--accent); }

/* ── SPLASH / LOADING ── */
#splash {
  position: fixed; inset: 0; z-index: 20;
  background: var(--space);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 0.6s;
}
#splash.hidden { opacity: 0; pointer-events: none; }
.splash-ring {
  width: 64px; height: 64px;
  border: 2px solid rgba(0,212,255,0.12);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 1.6rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.splash-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 900;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}
.splash-sub {
  font-size: 0.68rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-bottom: 2rem;
  text-transform: uppercase;
}
#btn-start {
  font-family: 'Orbitron', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  padding: 0.9rem 2.5rem;
  border: 1.5px solid var(--accent);
  background: rgba(0,212,255,0.07);
  color: var(--accent);
  cursor: pointer;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  text-transform: uppercase;
}
#btn-start::before {
  content:''; position:absolute; inset:0;
  background: var(--accent);
  transform: translateX(-101%);
  transition: transform 0.3s;
  z-index: -1;
}
#btn-start:hover { color: var(--space); }
#btn-start:hover::before { transform: translateX(0); }

#splash-error {
  margin-top: 1rem;
  font-size: 0.68rem;
  color: #ff6b6b;
  letter-spacing: 0.05em;
  text-align: center;
  max-width: 280px;
  line-height: 1.6;
  display: none;
}

/* bottom hint */
#bottom-hint {
  position: fixed; bottom: 20px; left: 0; right: 0;
  text-align: center; z-index: 3;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: rgba(100,150,200,0.3);
  pointer-events: none;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-detect"></canvas>

<div id="hud">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>
  <div id="hud-bar">
    <span id="hud-title">COSMOS AR</span>
    <div id="hud-status">● A PROCURAR</div>
  </div>
</div>

<div id="reticle">
  <div class="ret-ring"></div>
  <div class="ret-ring r2"></div>
  <div class="ret-cross-h"></div>
  <div class="ret-cross-v"></div>
</div>
<div id="reticle-label">Centra o planeta no círculo</div>

<div id="ar-overlay">
  <svg id="ar-line-svg"><line id="ar-line" stroke="rgba(0,212,255,0.5)" stroke-width="1" stroke-dasharray="4,4"/></svg>
  <div id="ar-dot"></div>
  <div id="ar-card">
    <div class="card-top-bar"></div>
    <div class="card-header">
      <div class="card-planet-dot" id="card-dot"></div>
      <div>
        <div class="card-planet-name" id="card-name">—</div>
        <div class="card-planet-type" id="card-type">—</div>
      </div>
    </div>
    <div class="card-body" id="card-body">—</div>
    <div class="card-stats" id="card-stats"></div>
    <button class="card-close" onclick="closeAR()">✕ &nbsp;FECHAR</button>
  </div>
</div>

<div id="splash">
  <div class="splash-ring"></div>
  <div class="splash-title">COSMOS AR</div>
  <div class="splash-sub">Sistema Solar · Realidade Aumentada</div>
  <button id="btn-start" onclick="startCamera()">◎ &nbsp;ABRIR CÂMERA</button>
  <div id="splash-error"></div>
</div>

<div id="bottom-hint">Cosmos AR · Deteção por cor</div>

<script>
// ═══════════════════════════════════════════════════
//  DADOS DOS PLANETAS — edita aqui os textos!
// ═══════════════════════════════════════════════════
const PLANETS = {

  terra: {
    name: 'Terra',
    type: 'Planeta Rochoso',
    // COR dominante do planeta em HSL (hue, satMin, satMax, ligMin, ligMax)

    glow: '#4a9eff',

    // ── TEXTO QUE APARECE NO OVERLAY ── (edita aqui!)
    descricao: 'O nosso lar e único planeta conhecido com vida. 71% da superfície é coberta por oceanos. A atmosfera de azoto e oxigénio protege todos os seres vivos das radiações solares.',

    // ── ESTATÍSTICAS (edita à vontade) ──
    stats: [
      { label: 'Diâmetro',   value: '12.742', unit: 'km'   },
      { label: 'Dist. Sol',  value: '149,6M', unit: 'km'   },

      { label: 'Satélites',  value: '1',      unit: 'lua'  },
    ],
  },

  marte: {
    name: 'Marte',
    type: 'Planeta Rochoso',
    hue: [0, 25],
    sat: [0.35, 1.0],
    lig: [0.18, 0.6],
    gradient: 'radial-gradient(circle at 35% 35%, #e87858, #c04020 50%, #601808)',
    glow: '#d4512a',

    // ── TEXTO QUE APARECE NO OVERLAY ──
    descricao: 'O Planeta Vermelho. Tem o maior vulcão do Sistema Solar: o Olympus Mons com 22 km de altura. Tem duas pequenas luas — Fobos e Deimos — e é candidato à colonização humana.',

    stats: [
      { label: 'Diâmetro',   value: '6.779',  unit: 'km'   },
      { label: 'Dist. Sol',  value: '227,9M', unit: 'km'   },
      { label: 'Ano',        value: '687',    unit: 'dias' },
      { label: 'Satélites',  value: '2',      unit: 'luas' },
    ],
  },

  jupiter: {
    name: 'Júpiter',
    type: 'Gigante Gasoso',
    hue: [25, 50],
    sat: [0.25, 0.85],
    lig: [0.3, 0.7],
    gradient: 'radial-gradient(circle at 35% 35%, #e8d0a0, #b88040 40%, #705018)',
    glow: '#c8a060',

    // ── TEXTO QUE APARECE NO OVERLAY ──
    descricao: 'O maior planeta do Sistema Solar. A sua Grande Mancha Vermelha é uma tempestade que dura há mais de 350 anos. Tem 95 luas conhecidas e um campo magnético 14× mais forte que o da Terra.',

    stats: [
      { label: 'Diâmetro',   value: '139.820', unit: 'km'   },
      { label: 'Dist. Sol',  value: '778,5M',  unit: 'km'   },
      { label: 'Ano',        value: '11,86',   unit: 'anos' },
      { label: 'Satélites',  value: '95',      unit: 'luas' },
    ],
  },

  saturno: {
    name: 'Saturno',
    type: 'Gigante Gasoso',
    hue: [40, 60],
    sat: [0.3, 0.8],
    lig: [0.45, 0.75],
    gradient: 'radial-gradient(circle at 35% 35%, #f0e090, #c8a828 50%, #806010)',
    glow: '#d4b030',

    // ── TEXTO QUE APARECE NO OVERLAY ──
    descricao: 'Famoso pelos seus magníficos anéis formados por gelo e rocha. É o planeta menos denso do Sistema Solar — flutuaria na água! Tem 146 luas conhecidas, incluindo Titã com atmosfera densa.',

    stats: [
      { label: 'Diâmetro',   value: '116.460', unit: 'km'   },
      { label: 'Dist. Sol',  value: '1,43B',   unit: 'km'   },
      { label: 'Ano',        value: '29,46',   unit: 'anos' },
      { label: 'Satélites',  value: '146',     unit: 'luas' },
    ],
  },

  mercurio: {
    name: 'Mercúrio',
    type: 'Planeta Rochoso',
    hue: [15, 35],
    sat: [0.05, 0.35],
    lig: [0.35, 0.65],
    gradient: 'radial-gradient(circle at 35% 35%, #c4b4a4, #8a7060 50%, #50382c)',
    glow: '#b89880',

    // ── TEXTO QUE APARECE NO OVERLAY ──
    descricao: 'O menor planeta do Sistema Solar e o mais próximo do Sol. Sem atmosfera significativa, as temperaturas variam de -180 °C à noite a +430 °C de dia. A superfície é coberta de crateras.',

    stats: [
      { label: 'Diâmetro',   value: '4.879',  unit: 'km'   },
      { label: 'Dist. Sol',  value: '57,9M',  unit: 'km'   },
      { label: 'Ano',        value: '88',     unit: 'dias' },
      { label: 'Temp. Máx',  value: '430',    unit: '°C'   },
    ],
  },

  venus: {
    name: 'Vénus',
    type: 'Planeta Rochoso',
    hue: [45, 65],
    sat: [0.5, 1.0],
    lig: [0.45, 0.8],
    gradient: 'radial-gradient(circle at 35% 35%, #f5e0a0, #d4a840 50%, #7a5808)',
    glow: '#e8c060',

    // ── TEXTO QUE APARECE NO OVERLAY ──
    descricao: 'O planeta mais quente do Sistema Solar graças ao efeito de estufa extremo — as temperaturas atingem 462 °C. Roda no sentido inverso dos outros planetas e é visível a olho nu ao pôr do sol.',

    stats: [
      { label: 'Diâmetro',   value: '12.104', unit: 'km'   },
      { label: 'Dist. Sol',  value: '108,2M', unit: 'km'   },
      { label: 'Ano',        value: '225',    unit: 'dias' },
      { label: 'Temp.',      value: '462',    unit: '°C'   },
    ],
  },

};

// ═══════════════════════════════════════════════════
//  LÓGICA DA APP
// ═══════════════════════════════════════════════════

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas-detect');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const overlay  = document.getElementById('ar-overlay');
const arDot    = document.getElementById('ar-dot');
const arCard   = document.getElementById('ar-card');
const arLine   = document.getElementById('ar-line');
const statusEl = document.getElementById('hud-status');
const retLabel = document.getElementById('reticle-label');

let detecting = false;
let currentPlanet = null;
let scanInterval = null;
let holdCount = 0;
let lastDetected = null;
const HOLD_FRAMES = 5; // frames seguidas para confirmar deteção

async function startCamera() {
  const errEl = document.getElementById('splash-error');
  errEl.style.display = 'none';
  document.getElementById('btn-start').textContent = '◎  A ABRIR...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('splash').classList.add('hidden');
    startDetection();
  } catch (e) {
    document.getElementById('btn-start').textContent = '◎  ABRIR CÂMERA';
    errEl.style.display = 'block';
    if (e.name === 'NotAllowedError') {
      errEl.textContent = 'Permissão de câmera negada. Vai às definições do browser e permite o acesso à câmera.';
    } else if (e.name === 'NotFoundError') {
      errEl.textContent = 'Câmera não encontrada. Certifica-te que o dispositivo tem câmera disponível.';
    } else {
      errEl.textContent = 'Erro ao abrir câmera: ' + e.message + '. Tenta usar HTTPS ou localhost.';
    }
  }
}

function startDetection() {
  detecting = true;
  scanInterval = setInterval(analyzeFrame, 200); // analisa 5x por segundo
}

function analyzeFrame() {
  if (!detecting || currentPlanet) return;
  if (video.readyState < 2) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  // Analisa apenas a zona central (onde está o reticle)
  const sw = Math.round(vw * 0.35);
  const sh = Math.round(vh * 0.35);
  const sx = Math.round((vw - sw) / 2);
  const sy = Math.round((vh - sh) / 2);

  canvas.width = sw;
  canvas.height = sh;
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

  const imageData = ctx.getImageData(0, 0, sw, sh);
  const detected = classifyByColor(imageData.data);

  if (detected === lastDetected) {
    holdCount++;
    if (holdCount >= HOLD_FRAMES) {
      confirmDetection(detected);
    }
  } else {
    holdCount = 1;
    lastDetected = detected;
    if (detected) {
      statusEl.textContent = `● ${PLANETS[detected].name.toUpperCase()}?`;
      statusEl.className = '';
    } else {
      statusEl.textContent = '● A PROCURAR';
      statusEl.className = '';
      retLabel.textContent = 'Centra o planeta no círculo';
    }
  }
}

function classifyByColor(data) {
  // Conta pixels por hue bucket
  const hueVotes = {};
  let totalPixels = 0;

  for (let i = 0; i < data.length; i += 16) { // amostra cada 4 pixels
    const r = data[i], g = data[i+1], b = data[i+2];
    const [h, s, l] = rgbToHsl(r, g, b);

    // ignora pixels muito escuros ou muito claros (fundo)
    if (l < 0.08 || l > 0.88 || s < 0.06) continue;

    totalPixels++;
    const bucket = Math.round(h / 10) * 10;
    hueVotes[bucket] = (hueVotes[bucket] || 0) + 1;
  }

  if (totalPixels < 80) return null; // imagem muito escura/clara

  // Encontra a cor dominante
  let bestBucket = null, bestCount = 0;
  for (const [bucket, count] of Object.entries(hueVotes)) {
    if (count > bestCount) { bestCount = count; bestBucket = parseInt(bucket); }
  }

  if (!bestBucket || bestCount / totalPixels < 0.18) return null;

  // Calcula HSL médio da zona dominante
  let sumS = 0, sumL = 0, nDom = 0;
  for (let i = 0; i < data.length; i += 16) {
    const r = data[i], g = data[i+1], b = data[i+2];
    const [h, s, l] = rgbToHsl(r, g, b);
    if (l < 0.08 || l > 0.88 || s < 0.06) continue;
    const bucket = Math.round(h / 10) * 10;
    if (bucket === bestBucket) { sumS += s; sumL += l; nDom++; }
  }
  const avgS = nDom ? sumS/nDom : 0;
  const avgL = nDom ? sumL/nDom : 0;

  // Testa cada planeta
  for (const [id, p] of Object.entries(PLANETS)) {
    const [hMin, hMax] = p.hue;
    const inHue = hMax >= hMin
      ? (bestBucket >= hMin && bestBucket <= hMax)
      : (bestBucket >= hMin || bestBucket <= hMax); // wrap 360→0
    if (inHue && avgS >= p.sat[0] && avgS <= p.sat[1] && avgL >= p.lig[0] && avgL <= p.lig[1]) {
      return id;
    }
  }
  return null;
}

function confirmDetection(id) {
  if (!id || currentPlanet) return;
  clearInterval(scanInterval);
  detecting = false;
  currentPlanet = id;

  statusEl.textContent = '● DETETADO ✓';
  statusEl.className = 'found';
  retLabel.textContent = '';

  showAROverlay(id);
}

function showAROverlay(id) {
  const p = PLANETS[id];

  document.getElementById('card-name').textContent = p.name;
  document.getElementById('card-type').textContent = p.type;
  document.getElementById('card-body').textContent = p.descricao;

  const dot = document.getElementById('card-dot');
  dot.style.background = p.gradient;
  dot.style.boxShadow = `inset -3px -3px 8px rgba(0,0,0,.5), 0 0 16px ${p.glow}88`;

  document.getElementById('card-stats').innerHTML = p.stats.map(s =>
    `<div class="card-stat">
      <div class="card-stat-label">${s.label}</div>
      <div class="card-stat-value">${s.value}<span class="card-stat-unit">${s.unit}</span></div>
    </div>`
  ).join('');

  // Posiciona: ponto no centro do ecrã (onde estava o reticle)
  // Card: canto superior ou inferior dependendo do espaço
  const cw = window.innerWidth, ch = window.innerHeight;
  const cx = cw / 2, cy = ch / 2;

  arDot.style.left = cx + 'px';
  arDot.style.top  = cy + 'px';

  overlay.classList.add('active');

  // Posiciona o card
  requestAnimationFrame(() => {
    const cardH = arCard.offsetHeight;
    const cardW = arCard.offsetWidth;
    let cardX, cardY;

    // Prefere colocar o card no lado com mais espaço
    if (cy > ch / 2) {
      cardY = cy - cardH - 60;
    } else {
      cardY = cy + 60;
    }
    cardX = Math.max(8, Math.min(cw - cardW - 8, cx - cardW / 2));

    arCard.style.left = cardX + 'px';
    arCard.style.top  = cardY + 'px';

    // Linha SVG
    const lineStartX = cx;
    const lineStartY = cy;
    const lineEndX   = cardX + cardW / 2;
    const lineEndY   = cardY > cy ? cardY : cardY + cardH;

    arLine.setAttribute('x1', lineStartX);
    arLine.setAttribute('y1', lineStartY);
    arLine.setAttribute('x2', lineEndX);
    arLine.setAttribute('y2', lineEndY);
  });
}

function closeAR() {
  overlay.classList.remove('active');
  currentPlanet = null;
  lastDetected = null;
  holdCount = 0;
  statusEl.textContent = '● A PROCURAR';
  statusEl.className = '';
  retLabel.textContent = 'Centra o planeta no círculo';
  detecting = true;
  scanInterval = setInterval(analyzeFrame, 200);
}

// ── Conversão RGB → HSL ──
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch(max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [h * 360, s, l];
}

// ── Redimensiona canvas SVG ao resize ──
window.addEventListener('resize', () => {
  if (currentPlanet) showAROverlay(currentPlanet);
});
</script>
