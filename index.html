<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planetas AR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020818;
  --panel:rgba(2,12,36,0.96);
  --accent:#00d4ff;
  --green:#00ff88;
  --yellow:#ffd600;
  --muted:rgba(160,200,255,0.5);
  --border:rgba(0,212,255,0.2);
  --text:#e8f4ff;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Exo 2',sans-serif;color:var(--text);user-select:none;-webkit-user-select:none}

/* VIDEO */
#video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
#canvas-work{display:none}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:8;
  display:flex;align-items:center;padding:14px 16px;gap:12px;
  background:linear-gradient(to bottom,rgba(2,8,24,0.9) 0%,transparent 100%);
  pointer-events:none;
}
#app-name{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:.28em;color:var(--muted)}
#status-badge{
  margin-left:auto;
  font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:.14em;
  padding:4px 10px;border-radius:2px;border:1px solid var(--border);
  color:var(--accent);white-space:nowrap;
  transition:color .25s,border-color .25s,background .25s;
}
#status-badge.lock{color:var(--yellow);border-color:rgba(255,214,0,.45);background:rgba(255,214,0,.06);animation:badgePulse .7s ease-in-out infinite alternate}
#status-badge.done{color:var(--green);border-color:rgba(0,255,136,.45);background:rgba(0,255,136,.06);animation:none}
@keyframes badgePulse{from{opacity:.7}to{opacity:1}}

/* RETICLE */
#reticle{
  position:fixed;z-index:5;pointer-events:none;
  transform:translate(-50%,-50%);
  transition:opacity .3s;
}
#reticle.hidden{opacity:0}
.rc{position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid;border-width:0;opacity:.75;transition:border-color .25s}
.rc.tl{top:0;left:0;border-top-width:2px;border-left-width:2px}
.rc.tr{top:0;right:0;border-top-width:2px;border-right-width:2px}
.rc.bl{bottom:0;left:0;border-bottom-width:2px;border-left-width:2px}
.rc.br{bottom:0;right:0;border-bottom-width:2px;border-right-width:2px}
#reticle.lock .rc{border-color:var(--yellow)}
#reticle.done .rc{border-color:var(--green)}

/* Progress ring SVG around reticle */
#ring-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);overflow:visible;pointer-events:none}
#ring-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:2}
#ring-fill{fill:none;stroke:var(--yellow);stroke-width:2;stroke-linecap:round;transition:stroke-dashoffset .15s linear}

#ret-hint{
  position:absolute;top:calc(100% + 14px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:.62rem;letter-spacing:.1em;color:var(--muted);
  animation:hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* SCREEN CORNERS */
.sc{position:fixed;z-index:4;pointer-events:none;width:20px;height:20px;border-color:rgba(0,212,255,.35);border-style:solid;border-width:0}
.sc.tl{top:10px;left:10px;border-top-width:1.5px;border-left-width:1.5px}
.sc.tr{top:10px;right:10px;border-top-width:1.5px;border-right-width:1.5px}
.sc.bl{bottom:10px;left:10px;border-bottom-width:1.5px;border-left-width:1.5px}
.sc.br{bottom:10px;right:10px;border-bottom-width:1.5px;border-right-width:1.5px}

/* ── AR OVERLAY ── */
#ar-overlay{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  background:rgba(2,8,24,.55);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#ar-overlay.active{opacity:1;pointer-events:auto}

/* Back button — grande e claro */
#btn-back{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;gap:10px;
  padding:16px 20px;
  background:linear-gradient(to bottom,rgba(2,8,24,.95),transparent);
  border:none;cursor:pointer;color:var(--text);
  font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;
}
#btn-back:active{opacity:.7}
.back-icon{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--accent);flex-shrink:0;
  background:rgba(0,212,255,.08);
}
.back-text{color:var(--muted);font-size:.62rem;letter-spacing:.18em}

/* Planet dot indicator (top, under back btn) */
#ar-planet-header{
  position:absolute;top:70px;left:0;right:0;
  display:flex;align-items:center;gap:14px;
  padding:0 20px;
  pointer-events:none;
}
#ar-globe{width:52px;height:52px;border-radius:50%;flex-shrink:0;box-shadow:inset -5px -5px 12px rgba(0,0,0,.6)}
#ar-pname{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;letter-spacing:.05em}
#ar-ptype{font-size:.62rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:3px}
#ar-detected{
  margin-left:auto;
  font-size:.52rem;letter-spacing:.14em;
  color:var(--green);border:1px solid rgba(0,255,136,.3);
  padding:3px 8px;border-radius:2px;white-space:nowrap;
  animation:badgePulse .9s ease-in-out infinite alternate;
}

/* Info card — slides up from bottom */
#ar-card{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--panel);
  border-top:1px solid var(--border);
  border-radius:12px 12px 0 0;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.34,1.28,.64,1);
  overflow:hidden;
}
#ar-overlay.active #ar-card{transform:translateY(0)}

.card-pill{
  width:36px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.15);
  margin:10px auto 0;
}
.card-accent-bar{height:2px;background:linear-gradient(90deg,var(--accent),#7b6cff);margin:10px 0 0}
.card-desc-text{
  padding:14px 18px 10px;
  font-size:.8rem;line-height:1.8;
  color:rgba(200,225,255,.84);
  border-bottom:1px solid var(--border);
}
.card-stats-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:rgba(0,212,255,.07);
}
.stat-cell{background:var(--panel);padding:10px 16px}
.stat-lbl{font-size:.5rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.stat-val{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;color:var(--accent)}
.stat-u{font-size:.55rem;color:var(--muted);margin-left:2px;font-family:'Exo 2',sans-serif}

/* ── DEBUG ── */
#debug-box{
  position:fixed;bottom:14px;left:12px;z-index:12;
  background:rgba(0,0,0,.8);border:1px solid #0f04;border-radius:3px;
  padding:8px 12px;font-family:monospace;font-size:11px;color:#0f0;
  line-height:1.75;display:none;pointer-events:none;
}
#debug-box.on{display:block}
#btn-debug{
  position:fixed;bottom:14px;right:14px;z-index:12;
  font-size:.5rem;font-family:'Orbitron',monospace;letter-spacing:.1em;
  padding:5px 10px;border:1px solid var(--border);background:rgba(0,0,0,.7);
  color:var(--muted);border-radius:2px;cursor:pointer;
}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:20;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s;
}
#splash.out{opacity:0;pointer-events:none}
.sp-spinner{width:56px;height:56px;border:2px solid rgba(0,212,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1.6rem}
@keyframes spin{to{transform:rotate(360deg)}}
.sp-title{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,6vw,2.2rem);font-weight:900;letter-spacing:.2em;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem}
.sp-sub{font-size:.62rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:.7rem}
.sp-hint{font-size:.7rem;color:rgba(150,200,255,.65);text-align:center;max-width:240px;line-height:1.85;margin-bottom:2rem}
.sp-hint b{color:var(--accent);font-weight:600}
#btn-cam{
  font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;letter-spacing:.2em;
  padding:.9rem 2.6rem;border:1.5px solid var(--accent);background:rgba(0,212,255,.07);
  color:var(--accent);cursor:pointer;border-radius:2px;
  position:relative;overflow:hidden;transition:color .3s;text-transform:uppercase;
}
#btn-cam::before{content:'';position:absolute;inset:0;background:var(--accent);transform:translateX(-101%);transition:transform .3s;z-index:-1}
#btn-cam:hover{color:var(--bg)}
#btn-cam:hover::before{transform:translateX(0)}
#cam-err{margin-top:1rem;font-size:.65rem;color:#ff6b6b;display:none;text-align:center;max-width:280px;line-height:1.7}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-work"></canvas>

<!-- Screen corners -->
<div class="sc tl"></div><div class="sc tr"></div>
<div class="sc bl"></div><div class="sc br"></div>

<!-- Top bar -->
<div id="topbar">
  <span id="app-name">COSMOS AR</span>
  <div id="status-badge">● A PROCURAR</div>
</div>

<!-- Reticle -->
<div id="reticle">
  <svg id="ring-svg"><circle id="ring-track"/><circle id="ring-fill"/></svg>
  <div class="rc tl"></div><div class="rc tr"></div>
  <div class="rc bl"></div><div class="rc br"></div>
  <div id="ret-hint">Centra o planeta aqui</div>
</div>

<!-- AR Overlay -->
<div id="ar-overlay">
  <button id="btn-back" onclick="closeAR()">
    <div class="back-icon">←</div>
    <span class="back-text">VOLTAR A PROCURAR</span>
  </button>

  <div id="ar-planet-header">
    <div id="ar-globe"></div>
    <div>
      <div id="ar-pname">—</div>
      <div id="ar-ptype">—</div>
    </div>
    <div id="ar-detected">● DETETADO</div>
  </div>

  <div id="ar-card">
    <div class="card-pill"></div>
    <div class="card-accent-bar"></div>
    <div class="card-desc-text" id="card-desc">—</div>
    <div class="card-stats-grid" id="card-stats"></div>
  </div>
</div>

<!-- Debug -->
<div id="debug-box"></div>
<button id="btn-debug" onclick="toggleDebug()">DEBUG</button>

<!-- Splash -->
<div id="splash">
  <div class="sp-spinner"></div>
  <div class="sp-title">COSMOS AR</div>
  <div class="sp-sub">Deteção de Planetas</div>
  <div class="sp-hint">Aponta a câmera para o planeta<br>e <b>centra-o no círculo</b><br>A deteção é automática</div>
  <button id="btn-cam" onclick="startCamera()">◎ &nbsp;ABRIR CÂMERA</button>
  <div id="cam-err"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  DADOS — edita aqui os textos e cores
// ═══════════════════════════════════════════
const PLANETS = [
  {
    id: 'terra',
    name: 'Terra',
    type: 'Planeta Rochoso · 3.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #7ac8f0, #1a6eb5 40%, #0a3060)',
    glow: '#4a9eff',

    // ── Texto que aparece no overlay ──
    descricao: 'O nosso lar e único planeta conhecido com vida. 71% da superfície é coberta por oceanos. A atmosfera de azoto e oxigénio protege todos os seres vivos das radiações solares.',

    // ── Estatísticas ──
    stats: [
      { label: 'Diâmetro',  value: '12.742', unit: 'km'   },
      { label: 'Dist. Sol', value: '149,6M', unit: 'km'   },
      { label: 'Ano',       value: '365',    unit: 'dias' },
      { label: 'Satélites', value: '1',      unit: 'lua'  },
    ],

    // ── Critérios de deteção (usa DEBUG para ver os valores reais) ──
    // scores.blue, .green, .red, .brown, .roundness (0-1 cada)
    detect(s) {
      // Terra: azul + verde (continentes) + forma esferica uniforme em 360 graus
      // Ecra azul: falha em activeSectors (bordas concentradas) e green muito baixo
      return s.blue         > 0.18   // oceanos
          && s.green        > 0.04   // continentes (filtra ecras lisos)
          && s.blue         > s.red * 1.6
          && s.roundness    > 0.50   // forma esferica uniforme
          && s.activeSectors >= 6    // bordas em pelo menos 6 dos 12 sectores
          && s.variance     < 0.020  // bordas distribuidas (nao concentradas como ecra)
          && s.total        > 150;
    },
  },

  // Adiciona mais planetas aqui (descomenta e edita):
  // {
  //   id: 'marte',
  //   name: 'Marte',
  //   type: 'Planeta Rochoso · 4.º do Sol',
  //   gradient: 'radial-gradient(circle at 35% 35%, #e87858, #c04020 50%, #601808)',
  //   glow: '#d4512a',
  //   descricao: 'O Planeta Vermelho. Tem o maior vulcão do Sistema Solar...',
  //   stats: [{ label: 'Diâmetro', value: '6.779', unit: 'km' }],
  //   detect(s) { return s.red > 0.28 && s.red > s.blue * 1.8 && s.roundness > 0.4; },
  // },
];

// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CFG = {
  holdFrames:  5,     // frames para confirmar (5 = mais seguro contra falsos positivos)
  zoneRatio:   0.50,  // tamanho do círculo de deteção vs largura do ecrã
  workSize:    160,   // canvas de trabalho (menor = mais rápido)
  edgeThresh:  20,    // sensibilidade de borda Sobel
  scanMs:      120,   // intervalo de análise em ms
};

// ═══════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════
const video  = document.getElementById('video');
const cWork  = document.getElementById('canvas-work');
const ctxW   = cWork.getContext('2d', { willReadFrequently: true });

let scanning     = false;
let scanTimer    = null;
let holdCount    = 0;
let lastId       = null;
let activePlanet = null;
let debugOn      = false;
let retPos       = { cx:0, cy:0, r:0 }; // posição do reticle no ecrã

// ── Pré-aloca buffers para evitar GC ──
let grayBuf = null;

// ═══════════════════════════════════════════
//  CÂMERA
// ═══════════════════════════════════════════
async function startCamera() {
  const errEl = document.getElementById('cam-err');
  errEl.style.display = 'none';
  const btn = document.getElementById('btn-cam');
  btn.textContent = '● A ABRIR...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('splash').classList.add('out');
    setupReticle();
    window.addEventListener('resize', setupReticle);
    startScanning();
  } catch (e) {
    btn.textContent = '◎  ABRIR CÂMERA';
    errEl.style.display = 'block';
    errEl.textContent =
      e.name === 'NotAllowedError' ? 'Permissão de câmera negada. Abre as definições do browser e permite o acesso.' :
      e.name === 'NotFoundError'   ? 'Câmera não encontrada neste dispositivo.' :
                                     'Erro: ' + e.message + ' · Precisas de HTTPS ou localhost.';
  }
}

// ═══════════════════════════════════════════
//  RETICLE
// ═══════════════════════════════════════════
function setupReticle() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const r  = Math.round(Math.min(vw, vh) * CFG.zoneRatio / 2);
  const cx = Math.round(vw / 2);
  const cy = Math.round(vh * 0.42);
  retPos = { cx, cy, r };

  const ret = document.getElementById('reticle');
  const d   = r * 2;
  ret.style.width  = d + 'px';
  ret.style.height = d + 'px';
  ret.style.left   = cx + 'px';
  ret.style.top    = cy + 'px';

  // SVG ring
  const svg   = document.getElementById('ring-svg');
  const circ  = 2 * Math.PI * (r + 6);
  svg.setAttribute('width',  d + 20);
  svg.setAttribute('height', d + 20);
  ['ring-track','ring-fill'].forEach(id => {
    const el = document.getElementById(id);
    el.setAttribute('cx', r + 10);
    el.setAttribute('cy', r + 10);
    el.setAttribute('r', r + 6);
    el.style.strokeDasharray  = circ;
    el.style.strokeDashoffset = circ;
  });
  document.getElementById('ring-fill').style.transform = 'rotate(-90deg)';
  document.getElementById('ring-fill').style.transformOrigin = (r+10)+'px '+(r+10)+'px';
  setProgress(0);
}

function setProgress(ratio) {
  const fill  = document.getElementById('ring-fill');
  const track = document.getElementById('ring-track');
  const circ  = parseFloat(fill.style.strokeDasharray) || 1;
  fill.style.strokeDashoffset  = circ * (1 - ratio);
  track.style.strokeDashoffset = 0;
}

// ═══════════════════════════════════════════
//  ANÁLISE — roda no main thread mas optimizado
// ═══════════════════════════════════════════
function startScanning() {
  scanning  = true;
  scanTimer = setInterval(tick, CFG.scanMs);
}

function stopScanning() {
  scanning = false;
  clearInterval(scanTimer);
  scanTimer = null;
}

function tick() {
  if (!scanning || activePlanet) return;
  if (video.readyState < 2 || !video.videoWidth) return;

  const scores = captureAndAnalyze();
  if (!scores) return;

  if (debugOn) renderDebug(scores);

  // Tenta cada planeta
  let matched = null;
  for (const p of PLANETS) {
    if (p.detect(scores)) { matched = p.id; break; }
  }

  if (matched && matched === lastId) {
    holdCount++;
    setRetState('lock');
    setBadge('lock', PLANETS.find(p=>p.id===matched).name);
    setProgress(holdCount / CFG.holdFrames);
    if (holdCount >= CFG.holdFrames) {
      stopScanning();
      showPlanet(matched);
    }
  } else {
    const changed = matched !== lastId;
    holdCount = matched ? 1 : 0;
    lastId    = matched;
    if (changed) {
      setRetState(matched ? 'lock' : 'idle');
      setBadge(matched ? 'lock' : 'idle', matched ? PLANETS.find(p=>p.id===matched).name : '');
      setProgress(matched ? 1/CFG.holdFrames : 0);
    }
  }
}

// ── Captura e analisa zona central ──────────
function captureAndAnalyze() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const sw = window.innerWidth, sh = window.innerHeight;

  // Calcula crop do vídeo correspondente ao reticle (object-fit:cover)
  const vidAR = vw/vh, scrAR = sw/sh;
  let dw, dh, ox, oy;
  if (vidAR > scrAR) { dh=sh; dw=sh*vidAR; ox=(dw-sw)/2; oy=0; }
  else               { dw=sw; dh=sw/vidAR; ox=0; oy=(dh-sh)/2; }
  const sx=dw/vw, sy=dh/vh;

  const { cx, cy, r } = retPos;
  const vcx = (cx+ox)/sx, vcy = (cy+oy)/sy, vr = r/sx;

  const crop = Math.round(vr*2.2);
  const x0   = Math.max(0, Math.round(vcx - crop/2));
  const y0   = Math.max(0, Math.round(vcy - crop/2));
  const cw   = Math.min(crop, vw-x0);
  const ch   = Math.min(crop, vh-y0);
  if (cw < 20 || ch < 20) return null;

  const W = CFG.workSize, H = CFG.workSize;
  cWork.width = W; cWork.height = H;
  ctxW.drawImage(video, x0, y0, cw, ch, 0, 0, W, H);

  // Usa ImageData directamente
  const d = ctxW.getImageData(0, 0, W, H).data;
  return analyzeZone(d, W, H);
}

function analyzeZone(data, W, H) {
  const cx = W>>1, cy = H>>1;
  const cr  = W * 0.42;
  const cr2 = cr * cr;
  const T   = CFG.edgeThresh;

  if (!grayBuf || grayBuf.length !== W*H) grayBuf = new Uint8Array(W*H);
  for (let i=0, p=0; i<W*H; i++, p+=4)
    grayBuf[i] = (data[p]*77 + data[p+1]*150 + data[p+2]*29) >> 8;

  let blue=0, green=0, red=0, brown=0, total=0;

  // Distribucao angular de bordas — 12 sectores de 30 graus cada
  // Esfera: bordas distribuidas uniformemente em todos os sectores
  // Ecra / caixa: bordas concentradas em 2-4 sectores (horizontais/verticais)
  const SECTORS = 12;
  const sectorEdge = new Uint16Array(SECTORS);
  const sectorTot  = new Uint16Array(SECTORS);

  // Anel onde contamos bordas: entre 60% e 95% do raio
  const ringInner2 = cr2 * 0.36; // 60%^2
  const ringOuter2 = cr2 * 0.90; // 95%^2

  for (let y=1; y<H-1; y++) {
    for (let x=1; x<W-1; x++) {
      const dx=x-cx, dy=y-cy, d2=dx*dx+dy*dy;
      if (d2>cr2) continue;

      const p = (y*W+x)<<2;
      const r=data[p], g=data[p+1], b=data[p+2];
      const lum = (r+g+b)*0.333|0;
      if (lum<22||lum>238) continue;

      total++;
      if (b>r  && b>g  && b>50  && b-r>16)              blue++;
      if (g>r  && g>b  && g>44  && g-b>10)              green++;
      if (r>g  && r>b  && r>65  && r-b>22)              red++;
      if (r>95 && r>b  && g>b   && r-b>22 && Math.abs(r-g)<55) brown++;

      // Bordas no anel — divididas por sector angular
      if (d2 >= ringInner2 && d2 <= ringOuter2) {
        const angle = Math.atan2(dy, dx); // -PI a PI
        const sector = Math.floor(((angle + Math.PI) / (2*Math.PI)) * SECTORS) % SECTORS;
        sectorTot[sector]++;
        const i  = y*W+x;
        const gx = -grayBuf[i-W-1]+grayBuf[i-W+1]-2*grayBuf[i-1]+2*grayBuf[i+1]-grayBuf[i+W-1]+grayBuf[i+W+1];
        const gy = -grayBuf[i-W-1]-2*grayBuf[i-W]-grayBuf[i-W+1]+grayBuf[i+W-1]+2*grayBuf[i+W]+grayBuf[i+W+1];
        if ((Math.abs(gx)+Math.abs(gy)) > T) sectorEdge[sector]++;
      }
    }
  }

  if (total < 80) return {blue:0,green:0,red:0,brown:0,roundness:0,edgeDensity:0,total};

  // Calcula densidade de borda por sector
  const densities = [];
  let totalEdgePx = 0, totalRingPx = 0;
  for (let s=0; s<SECTORS; s++) {
    totalEdgePx += sectorEdge[s];
    totalRingPx += sectorTot[s];
    densities.push(sectorTot[s]>0 ? sectorEdge[s]/sectorTot[s] : 0);
  }
  const eD = totalRingPx>0 ? totalEdgePx/totalRingPx : 0;

  // Uniformidade: conta quantos sectores com bordas suficientes (>2%)
  // Esfera pintada: 7-12 sectores activos
  // Ecra / fundo liso: 0-3 sectores activos (so nas bordas do ecra)
  const activeSectors = densities.filter(d => d > 0.02).length;

  // Variancia da densidade entre sectores — baixa = uniforme (esfera), alta = concentrado (ecra)
  const meanD = densities.reduce((a,b)=>a+b,0) / SECTORS;
  const variance = densities.reduce((a,d)=>a+(d-meanD)**2, 0) / SECTORS;

  // roundness: muitos sectores activos + baixa variancia + densidade moderada
  let roundness = 0;
  if (activeSectors >= 6 && eD > 0.04 && eD < 0.72 && variance < 0.018) {
    roundness = Math.min(1, (activeSectors / SECTORS) * (1 - variance * 20));
  }

  return {
    blue:   blue/total,
    green:  green/total,
    red:    red/total,
    brown:  brown/total,
    roundness,
    edgeDensity: eD,
    activeSectors,
    variance: Math.round(variance*1000)/1000,
    total,
  };
}

// ═══════════════════════════════════════════
//  MOSTRAR PLANETA
// ═══════════════════════════════════════════
function showPlanet(id) {
  const planet = PLANETS.find(p=>p.id===id);
  activePlanet = id;

  // Preenche o overlay
  document.getElementById('ar-pname').textContent = planet.name;
  document.getElementById('ar-ptype').textContent = planet.type;
  document.getElementById('card-desc').textContent = planet.descricao;

  const globe = document.getElementById('ar-globe');
  globe.style.background = planet.gradient;
  globe.style.boxShadow  = `inset -5px -5px 12px rgba(0,0,0,.6), 0 0 24px ${planet.glow}88`;

  document.getElementById('card-stats').innerHTML = planet.stats.map(s =>
    `<div class="stat-cell"><div class="stat-lbl">${s.label}</div><div class="stat-val">${s.value}<span class="stat-u">${s.unit}</span></div></div>`
  ).join('');

  // Para a camera (poupa CPU e bateria)
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.enabled = false);
    video.pause();
  }

  // Esconde reticle
  document.getElementById('reticle').classList.add('hidden');

  // Activa overlay (transition CSS trata do fade + slide)
  requestAnimationFrame(() => {
    document.getElementById('ar-overlay').classList.add('active');
  });

  setBadge('done', planet.name);
  setRetState('done');
}

// ═══════════════════════════════════════════
//  FECHAR OVERLAY
// ═══════════════════════════════════════════
function closeAR() {
  document.getElementById('ar-overlay').classList.remove('active');

  // Reativa camera e scanning apos transicao
  setTimeout(() => {
    // Reativa camera
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.enabled = true);
      video.play();
    }
    activePlanet = null;
    holdCount    = 0;
    lastId       = null;
    setRetState('idle');
    setBadge('idle');
    setProgress(0);
    document.getElementById('reticle').classList.remove('hidden');
    document.getElementById('ret-hint').textContent = 'Centra o planeta aqui';
    startScanning();
  }, 320);
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function setRetState(state) {
  document.getElementById('reticle').className = state === 'idle' ? '' : state;
}

function setBadge(state, name) {
  const el = document.getElementById('status-badge');
  if (state==='idle')   { el.textContent='● A PROCURAR'; el.className=''; }
  if (state==='lock')   { el.textContent=`◉ ${(name||'').toUpperCase()}`; el.className='lock'; }
  if (state==='done')   { el.textContent=`✓ ${(name||'').toUpperCase()}`; el.className='done'; }
}

// ═══════════════════════════════════════════
//  DEBUG
// ═══════════════════════════════════════════
function toggleDebug() {
  debugOn = !debugOn;
  document.getElementById('debug-box').classList.toggle('on', debugOn);
  document.getElementById('btn-debug').textContent = debugOn ? 'DEBUG ON' : 'DEBUG';
}

function renderDebug(s) {
  document.getElementById('debug-box').innerHTML =
    `blue:    ${(s.blue*100).toFixed(1)}%\n` +
    `green:   ${(s.green*100).toFixed(1)}%\n` +
    `red:     ${(s.red*100).toFixed(1)}%\n` +
    `round:   ${(s.roundness*100).toFixed(1)}%\n` +
    `sectors: ${s.activeSectors}/12\n` +
    `variance:${s.variance}\n` +
    `edges:   ${(s.edgeDensity*100).toFixed(1)}%\n` +
    `px:      ${s.total}\n` +
    `hold:    ${holdCount}/${CFG.holdFrames}`;
}

window.addEventListener('resize', () => {
  if (activePlanet) showPlanet(activePlanet);
});
</script>
