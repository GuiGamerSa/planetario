<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Planetas AR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --space: #020818;
  --panel: rgba(3, 14, 42, 0.94);
  --accent: #00d4ff;
  --text: #e8f4ff;
  --muted: rgba(180,210,255,0.55);
  --border: rgba(0,212,255,0.22);
  --green: #00ff88;
}
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Exo 2',sans-serif; color:var(--text); user-select:none; -webkit-user-select:none; }

/* VIDEO + CANVAS */
#video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
#canvas-display { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; pointer-events:none; }
#canvas-work { display:none; }

/* HUD */
#hud { position:fixed; inset:0; z-index:4; pointer-events:none; }
.hud-c { position:absolute; width:26px; height:26px; border-color:var(--accent); border-style:solid; border-width:0; opacity:0.55; }
.hud-c.tl { top:14px; left:14px; border-top-width:2px; border-left-width:2px; }
.hud-c.tr { top:14px; right:14px; border-top-width:2px; border-right-width:2px; }
.hud-c.bl { bottom:14px; left:14px; border-bottom-width:2px; border-left-width:2px; }
.hud-c.br { bottom:14px; right:14px; border-bottom-width:2px; border-right-width:2px; }

#hud-bar {
  position:absolute; top:0; left:0; right:0;
  padding:12px 16px;
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(to bottom, rgba(2,8,24,0.88), transparent);
}
#hud-title { font-family:'Orbitron',monospace; font-size:0.68rem; letter-spacing:0.25em; color:var(--muted); }
#hud-status {
  margin-left:auto;
  font-size:0.55rem; letter-spacing:0.15em;
  border:1px solid rgba(0,212,255,0.3); padding:3px 9px; border-radius:2px;
  color:var(--accent); font-family:'Orbitron',monospace;
  transition:color 0.3s, border-color 0.3s;
}
#hud-status.scanning { color:#ffcc00; border-color:rgba(255,204,0,0.35); }
#hud-status.found    { color:var(--green); border-color:rgba(0,255,136,0.4); animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* DEBUG toggle */
#btn-debug {
  position:fixed; bottom:18px; right:16px; z-index:10;
  font-size:0.55rem; font-family:'Orbitron',monospace; letter-spacing:0.1em;
  padding:5px 10px; border:1px solid var(--border); background:rgba(0,0,0,0.5);
  color:var(--muted); border-radius:2px; cursor:pointer;
}

/* AR OVERLAY */
#ar-overlay { position:fixed; inset:0; z-index:5; display:none; pointer-events:none; }
#ar-overlay.active { display:block; }

#ar-line-svg { position:absolute; inset:0; width:100%; height:100%; }

#ar-dot {
  position:absolute; width:12px; height:12px; border-radius:50%;
  background:var(--accent); transform:translate(-50%,-50%);
  box-shadow:0 0 16px var(--accent),0 0 4px #fff;
  animation:dotPulse 1.4s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100%{ box-shadow:0 0 14px var(--accent),0 0 3px #fff; transform:translate(-50%,-50%) scale(1); }
  50%    { box-shadow:0 0 28px var(--accent),0 0 8px #fff; transform:translate(-50%,-50%) scale(1.35); }
}

#ar-card {
  position:absolute; background:var(--panel); border:1px solid var(--border);
  border-radius:3px; width:min(300px,84vw); overflow:hidden;
  pointer-events:auto; animation:cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn { from{opacity:0;transform:scale(0.82)} to{opacity:1;transform:scale(1)} }

.card-bar { height:3px; background:linear-gradient(90deg,var(--accent),#7b6cff); }
.card-header { padding:10px 14px 9px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.card-dot { width:38px; height:38px; border-radius:50%; flex-shrink:0; box-shadow:inset -3px -3px 8px rgba(0,0,0,.5); }
.card-name { font-family:'Orbitron',monospace; font-size:1rem; font-weight:900; letter-spacing:0.06em; }
.card-type { font-size:0.6rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-top:2px; }
.card-desc { padding:10px 14px; font-size:0.75rem; line-height:1.75; color:rgba(200,225,255,0.82); border-bottom:1px solid var(--border); }
.card-stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(0,212,255,0.08); }
.c-stat { background:var(--panel); padding:7px 12px; }
.c-stat-lbl { font-size:0.52rem; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }
.c-stat-val { font-family:'Orbitron',monospace; font-size:0.8rem; font-weight:700; color:var(--accent); }
.c-stat-u { font-size:0.55rem; color:var(--muted); margin-left:2px; font-family:'Exo 2',sans-serif; }
.card-close { display:block; width:100%; padding:7px; background:none; border:none; border-top:1px solid var(--border); color:var(--muted); font-family:'Orbitron',monospace; font-size:0.55rem; letter-spacing:0.18em; cursor:pointer; transition:color 0.2s; text-transform:uppercase; pointer-events:auto; }
.card-close:hover { color:var(--accent); }

/* HINT */
#hint {
  position:fixed; bottom:52px; left:0; right:0; text-align:center; z-index:4;
  font-size:0.62rem; letter-spacing:0.12em; color:rgba(150,190,240,0.5);
  pointer-events:none; animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* SPLASH */
#splash {
  position:fixed; inset:0; z-index:20;
  background:var(--space);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.6s;
}
#splash.hidden { opacity:0; pointer-events:none; }
.sp-ring { width:60px; height:60px; border:2px solid rgba(0,212,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:1.5rem; }
@keyframes spin { to{transform:rotate(360deg)} }
.sp-title { font-family:'Orbitron',monospace; font-size:clamp(1.4rem,5vw,2rem); font-weight:900; letter-spacing:0.2em; background:linear-gradient(135deg,#fff 30%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.5rem; }
.sp-sub { font-size:0.65rem; letter-spacing:0.28em; color:var(--muted); margin-bottom:2rem; text-transform:uppercase; }
#btn-start { font-family:'Orbitron',monospace; font-size:0.78rem; font-weight:700; letter-spacing:0.2em; padding:0.9rem 2.4rem; border:1.5px solid var(--accent); background:rgba(0,212,255,0.07); color:var(--accent); cursor:pointer; border-radius:2px; position:relative; overflow:hidden; transition:all 0.3s; text-transform:uppercase; }
#btn-start::before { content:''; position:absolute; inset:0; background:var(--accent); transform:translateX(-101%); transition:transform 0.3s; z-index:-1; }
#btn-start:hover { color:var(--space); }
#btn-start:hover::before { transform:translateX(0); }
#sp-err { margin-top:1rem; font-size:0.65rem; color:#ff6b6b; display:none; text-align:center; max-width:280px; line-height:1.65; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-display"></canvas>
<canvas id="canvas-work"></canvas>

<div id="hud">
  <div class="hud-c tl"></div><div class="hud-c tr"></div>
  <div class="hud-c bl"></div><div class="hud-c br"></div>
  <div id="hud-bar">
    <span id="hud-title">COSMOS AR</span>
    <div id="hud-status">● A PROCURAR</div>
  </div>
</div>

<div id="ar-overlay">
  <svg id="ar-line-svg"><line id="ar-line" stroke="rgba(0,212,255,0.5)" stroke-width="1.5" stroke-dasharray="5,4"/></svg>
  <div id="ar-dot"></div>
  <div id="ar-card">
    <div class="card-bar"></div>
    <div class="card-header">
      <div class="card-dot" id="card-dot"></div>
      <div><div class="card-name" id="card-name">—</div><div class="card-type" id="card-type">—</div></div>
    </div>
    <div class="card-desc" id="card-desc">—</div>
    <div class="card-stats" id="card-stats"></div>
    <button class="card-close" onclick="closeAR()">✕ &nbsp;FECHAR · PROCURAR DE NOVO</button>
  </div>
</div>

<div id="hint">Aponta para o planeta · mantém estável</div>
<button id="btn-debug" onclick="toggleDebug()">DEBUG OFF</button>

<div id="splash">
  <div class="sp-ring"></div>
  <div class="sp-title">COSMOS AR</div>
  <div class="sp-sub">Deteção de Planetas</div>
  <button id="btn-start" onclick="startCamera()">◎ &nbsp;ABRIR CÂMERA</button>
  <div id="sp-err"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DADOS DOS PLANETAS  —  edita os textos aqui!
// ═══════════════════════════════════════════════════════════
const PLANETS = [
  {
    id: 'terra',
    name: 'Terra',
    type: 'Planeta Rochoso · 3.º do Sol',
    gradient: 'radial-gradient(circle at 35% 35%, #7ac8f0, #1a6eb5 40%, #0a3060)',
    glow: '#4a9eff',

    // ── DESCRIÇÃO (edita este texto!) ──────────────────────
    descricao: 'O nosso lar e único planeta conhecido com vida. 71% da superfície é coberta por oceanos de água líquida. A atmosfera de azoto e oxigénio protege todos os seres vivos das radiações solares.',

    // ── ESTATÍSTICAS (edita à vontade) ────────────────────
    stats: [
      { label: 'Diâmetro',  value: '12.742', unit: 'km'   },
      { label: 'Dist. Sol', value: '149,6M', unit: 'km'   },
      { label: 'Ano',       value: '365,25', unit: 'dias' },
      { label: 'Satélites', value: '1',      unit: 'lua'  },
    ],

    // ── CRITÉRIOS DE DETEÇÃO ──────────────────────────────
    // Analisa os pixels dentro da esfera detetada
    // Ajusta estes valores se a deteção falhar
    detect: {
      // % mínima de pixels AZUIS na esfera (0.0 a 1.0)
      blueMin: 0.22,
      // % mínima de pixels VERDES na esfera
      greenMin: 0.06,
      // A Terra tem MAIS azul que vermelho
      blueGtRed: true,
    },
  },

  // ── Para adicionar mais planetas, copia este bloco ──────
  // {
  //   id: 'marte',
  //   name: 'Marte',
  //   type: 'Planeta Rochoso · 4.º do Sol',
  //   gradient: 'radial-gradient(circle at 35% 35%, #e87858, #c04020 50%, #601808)',
  //   glow: '#d4512a',
  //   descricao: 'O Planeta Vermelho...',
  //   stats: [
  //     { label: 'Diâmetro', value: '6.779', unit: 'km' },
  //   ],
  //   detect: { redMin: 0.3, blueGtRed: false, greenMin: 0.0 },
  // },
];

// ═══════════════════════════════════════════════════════════
//  PARÂMETROS DE DETEÇÃO  —  afina aqui se necessário
// ═══════════════════════════════════════════════════════════
const CFG = {
  scanInterval:   180,  // ms entre análises (mais baixo = mais rápido mas mais CPU)
  holdFrames:     6,    // frames seguidas para confirmar (mais alto = mais estável)
  minCircleRatio: 0.06, // tamanho mínimo do círculo vs largura da imagem (0.0–1.0)
  maxCircleRatio: 0.55, // tamanho máximo
  stickRatio:     0.25, // % da imagem abaixo do centro que deve ter pixels de suporte
  edgeThreshold:  30,   // sensibilidade do detetor de bordas (10–80; mais baixo = mais sensível)
  downscale:      320,  // largura de trabalho em px (mais baixo = mais rápido)
};

// ═══════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════
const video    = document.getElementById('video');
const cDisp    = document.getElementById('canvas-display');
const ctxDisp  = cDisp.getContext('2d');
const cWork    = document.getElementById('canvas-work');
const ctxWork  = cWork.getContext('2d', { willReadFrequently: true });

let debugMode     = false;
let detecting     = false;
let scanTimer     = null;
let holdCount     = 0;
let lastId        = null;
let activePlanet  = null;
let animFrame     = null;

// ── CÂMERA ──────────────────────────────────────────────
async function startCamera() {
  const errEl = document.getElementById('sp-err');
  errEl.style.display = 'none';
  document.getElementById('btn-start').textContent = '● A ABRIR...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('splash').classList.add('hidden');
    resizeDisplay();
    window.addEventListener('resize', resizeDisplay);
    detecting = true;
    scanTimer = setInterval(analyzeFrame, CFG.scanInterval);
    if (debugMode) drawLoop();
  } catch (e) {
    document.getElementById('btn-start').textContent = '◎  ABRIR CÂMERA';
    errEl.style.display = 'block';
    errEl.textContent = e.name === 'NotAllowedError'
      ? 'Permissão negada. Permite o acesso à câmera nas definições do browser.'
      : e.name === 'NotFoundError'
      ? 'Câmera não encontrada neste dispositivo.'
      : 'Erro: ' + e.message + ' · Necessário HTTPS ou localhost.';
  }
}

function resizeDisplay() {
  cDisp.width  = window.innerWidth;
  cDisp.height = window.innerHeight;
}

// ── DEBUG LOOP ───────────────────────────────────────────
function drawLoop() {
  if (!debugMode) { ctxDisp.clearRect(0,0,cDisp.width,cDisp.height); return; }
  animFrame = requestAnimationFrame(drawLoop);
}

function toggleDebug() {
  debugMode = !debugMode;
  document.getElementById('btn-debug').textContent = debugMode ? 'DEBUG ON' : 'DEBUG OFF';
  if (debugMode) drawLoop();
  else { cancelAnimationFrame(animFrame); ctxDisp.clearRect(0,0,cDisp.width,cDisp.height); }
}

// ── ANÁLISE PRINCIPAL ────────────────────────────────────
function analyzeFrame() {
  if (!detecting || activePlanet) return;
  if (video.readyState < 2 || !video.videoWidth) return;

  // Downscale para velocidade
  const vw = video.videoWidth, vh = video.videoHeight;
  const scale = CFG.downscale / vw;
  const W = CFG.downscale, H = Math.round(vh * scale);
  cWork.width = W; cWork.height = H;
  ctxWork.drawImage(video, 0, 0, W, H);
  const imgData = ctxWork.getImageData(0, 0, W, H);

  // 1. Detetar bordas (Sobel simplificado)
  const edges = detectEdges(imgData.data, W, H);

  // 2. Encontrar círculo candidato (Hough simplificado)
  const circle = findCircle(edges, W, H);

  if (debugMode && circle) drawDebug(circle, W, H, scale);

  if (!circle) {
    updateStatus(null);
    return;
  }

  // 3. Verificar suporte (linha vertical abaixo do centro)
  const hasStick = checkStick(imgData.data, W, H, circle);

  // 4. Classificar cor dentro do círculo
  const planetId = classifyPlanet(imgData.data, W, H, circle);

  if (debugMode) drawDebugCircle(circle, hasStick, planetId, scale);

  const valid = planetId && hasStick;
  if (valid && planetId === lastId) {
    holdCount++;
    updateStatus('scanning', PLANETS.find(p => p.id === planetId)?.name || planetId);
    if (holdCount >= CFG.holdFrames) confirmPlanet(planetId, circle, scale);
  } else {
    holdCount = valid ? 1 : 0;
    lastId = valid ? planetId : null;
    updateStatus(valid ? 'maybe' : null);
  }
}

// ── DETETOR DE BORDAS (Sobel) ────────────────────────────
function detectEdges(data, W, H) {
  const gray = new Uint8Array(W * H);
  for (let i = 0; i < W * H; i++) {
    const p = i * 4;
    gray[i] = Math.round(0.299 * data[p] + 0.587 * data[p+1] + 0.114 * data[p+2]);
  }
  const edges = new Uint8Array(W * H);
  const T = CFG.edgeThreshold;
  for (let y = 1; y < H-1; y++) {
    for (let x = 1; x < W-1; x++) {
      const i = y*W + x;
      const gx = -gray[i-W-1] + gray[i-W+1] - 2*gray[i-1] + 2*gray[i+1] - gray[i+W-1] + gray[i+W+1];
      const gy = -gray[i-W-1] - 2*gray[i-W] - gray[i-W+1] + gray[i+W-1] + 2*gray[i+W] + gray[i+W+1];
      edges[i] = (Math.abs(gx) + Math.abs(gy)) > T ? 255 : 0;
    }
  }
  return edges;
}

// ── HOUGH CIRCLE TRANSFORM (simplificado) ───────────────
function findCircle(edges, W, H) {
  const rMin = Math.round(W * CFG.minCircleRatio);
  const rMax = Math.round(W * CFG.maxCircleRatio);
  const rStep = 2;
  const acc = {}; // acumulador {cx_cy_r: votes}

  const edgePixels = [];
  for (let i = 0; i < edges.length; i++) {
    if (edges[i]) edgePixels.push([i % W, Math.floor(i / W)]);
  }

  // Subsample para velocidade
  const step = Math.max(1, Math.floor(edgePixels.length / 600));

  for (let ei = 0; ei < edgePixels.length; ei += step) {
    const [ex, ey] = edgePixels[ei];
    for (let r = rMin; r <= rMax; r += rStep) {
      // Testa 16 ângulos por pixel de borda
      for (let a = 0; a < 16; a++) {
        const angle = (a / 16) * Math.PI * 2;
        const cx = Math.round(ex - r * Math.cos(angle));
        const cy = Math.round(ey - r * Math.sin(angle));
        if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;
        // Quantiza centro para bucket de 4px
        const bx = Math.round(cx / 4) * 4;
        const by = Math.round(cy / 4) * 4;
        const br = Math.round(r / rStep) * rStep;
        const key = `${bx},${by},${br}`;
        acc[key] = (acc[key] || 0) + 1;
      }
    }
  }

  // Encontra o melhor candidato
  let bestKey = null, bestVotes = 0;
  const minVotes = 8;
  for (const [key, v] of Object.entries(acc)) {
    if (v > bestVotes) { bestVotes = v; bestKey = key; }
  }
  if (!bestKey || bestVotes < minVotes) return null;

  const [cx, cy, r] = bestKey.split(',').map(Number);

  // Verifica que o círculo está razoavelmente centrado na imagem
  // (não nos cantos extremos)
  if (cx < r * 0.3 || cx > W - r * 0.3) return null;
  if (cy < r * 0.3 || cy > H - r * 1.8) return null; // permite espaço para o suporte abaixo

  return { cx, cy, r, votes: bestVotes };
}

// ── VERIFICAR SUPORTE (pau abaixo da esfera) ─────────────
function checkStick(data, W, H, circle) {
  const { cx, cy, r } = circle;
  // Analisa uma faixa estreita centrada abaixo da esfera
  const checkH = Math.round(H * CFG.stickRatio);
  const startY = cy + r + 2;
  const endY   = Math.min(H - 1, startY + checkH);
  const halfW  = Math.max(3, Math.round(r * 0.18)); // largura da faixa

  let brownCount = 0, total = 0;
  for (let y = startY; y <= endY; y++) {
    for (let x = cx - halfW; x <= cx + halfW; x++) {
      if (x < 0 || x >= W) continue;
      const p = (y * W + x) * 4;
      const rr = data[p], g = data[p+1], b = data[p+2];
      total++;
      // Pau de madeira: castanho/bege/amarelado
      // R > G > B e saturação moderada
      if (rr > 100 && rr > g && g > b && (rr - b) > 20) brownCount++;
    }
  }
  if (total === 0) return false;
  return (brownCount / total) > 0.25;
}

// ── CLASSIFICAR PLANETA POR COR ──────────────────────────
function classifyPlanet(data, W, H, circle) {
  const { cx, cy, r } = circle;
  const r2 = r * r * 0.75; // usa 87% do raio para evitar bordas

  let counts = { blue:0, green:0, red:0, total:0 };

  for (let y = cy - r; y <= cy + r; y++) {
    for (let x = cx - r; x <= cx + r; x++) {
      if (x < 0 || x >= W || y < 0 || y >= H) continue;
      const dx = x - cx, dy = y - cy;
      if (dx*dx + dy*dy > r2) continue;

      const p = (y * W + x) * 4;
      const rr = data[p], g = data[p+1], b = data[p+2];
      counts.total++;

      // Azul: b dominante e saturado
      if (b > rr && b > g && b > 60 && (b - rr) > 15) counts.blue++;
      // Verde: g dominante
      if (g > rr && g > b && g > 50 && (g - b) > 10) counts.green++;
      // Vermelho: r dominante
      if (rr > g && rr > b && rr > 60 && (rr - b) > 20) counts.red++;
    }
  }

  if (counts.total < 50) return null;

  const blueR  = counts.blue  / counts.total;
  const greenR = counts.green / counts.total;
  const redR   = counts.red   / counts.total;

  // Testa cada planeta
  for (const planet of PLANETS) {
    const d = planet.detect;
    let match = true;

    if (d.blueMin  !== undefined && blueR  < d.blueMin)  match = false;
    if (d.greenMin !== undefined && greenR < d.greenMin)  match = false;
    if (d.redMin   !== undefined && redR   < d.redMin)    match = false;
    if (d.blueGtRed === true  && blueR <= redR)           match = false;
    if (d.blueGtRed === false && redR  <= blueR)          match = false;

    if (match) return planet.id;
  }
  return null;
}

// ── DEBUG VISUAL ─────────────────────────────────────────
function drawDebugCircle(circle, hasStick, planetId, scale) {
  if (!debugMode) return;
  ctxDisp.clearRect(0, 0, cDisp.width, cDisp.height);
  const dw = cDisp.width, dh = cDisp.height;
  const vw = video.videoWidth, vh = video.videoHeight;
  // Escala do canvas de trabalho para o display
  const ws = CFG.downscale / vw;
  const sx = dw / vw, sy = dh / vh;

  const cx = (circle.cx / ws) * sx;
  const cy = (circle.cy / ws) * sy;
  const r  = (circle.r  / ws) * sx;

  ctxDisp.strokeStyle = planetId ? '#00ff88' : (hasStick ? '#ffcc00' : '#ff4444');
  ctxDisp.lineWidth = 2;
  ctxDisp.beginPath();
  ctxDisp.arc(cx, cy, r, 0, Math.PI*2);
  ctxDisp.stroke();

  // Centro
  ctxDisp.fillStyle = '#00d4ff';
  ctxDisp.beginPath();
  ctxDisp.arc(cx, cy, 4, 0, Math.PI*2);
  ctxDisp.fill();

  // Label debug
  ctxDisp.fillStyle = 'rgba(0,0,0,0.6)';
  ctxDisp.fillRect(cx - 60, cy + r + 6, 120, 36);
  ctxDisp.fillStyle = '#fff';
  ctxDisp.font = '11px monospace';
  ctxDisp.textAlign = 'center';
  ctxDisp.fillText(`r=${Math.round(circle.r)} stick=${hasStick?'✓':'✗'}`, cx, cy + r + 20);
  ctxDisp.fillText(`planet=${planetId || 'none'} hold=${holdCount}`, cx, cy + r + 34);
}

// ── STATUS HUD ───────────────────────────────────────────
function updateStatus(state, name) {
  const el = document.getElementById('hud-status');
  if (!state) {
    el.textContent = '● A PROCURAR';
    el.className = '';
  } else if (state === 'scanning') {
    el.textContent = `● ${(name||'').toUpperCase()}?`;
    el.className = 'scanning';
  } else if (state === 'maybe') {
    el.textContent = '● A CONFIRMAR...';
    el.className = 'scanning';
  }
}

// ── CONFIRMAR PLANETA ────────────────────────────────────
function confirmPlanet(id, circle, scale) {
  clearInterval(scanTimer);
  detecting = false;
  activePlanet = id;

  const planet = PLANETS.find(p => p.id === id);
  if (!planet) return;

  const el = document.getElementById('hud-status');
  el.textContent = `● ${planet.name.toUpperCase()} DETETADO`;
  el.className = 'found';

  document.getElementById('hint').style.display = 'none';

  // Posição real do círculo no ecrã
  const dw = cDisp.width, dh = cDisp.height;
  const vw = video.videoWidth, vh = video.videoHeight;
  const ws = CFG.downscale / vw;
  const sx = dw / vw, sy = dh / vh;
  const dotX = (circle.cx / ws) * sx;
  const dotY = (circle.cy / ws) * sy;

  showAROverlay(planet, dotX, dotY);
}

// ── MOSTRAR OVERLAY AR ────────────────────────────────────
function showAROverlay(planet, dotX, dotY) {
  document.getElementById('card-name').textContent  = planet.name;
  document.getElementById('card-type').textContent  = planet.type;
  document.getElementById('card-desc').textContent  = planet.descricao;

  const dot = document.getElementById('card-dot');
  dot.style.background = planet.gradient;
  dot.style.boxShadow  = `inset -3px -3px 8px rgba(0,0,0,.5), 0 0 18px ${planet.glow}88`;

  document.getElementById('card-stats').innerHTML = planet.stats.map(s =>
    `<div class="c-stat"><div class="c-stat-lbl">${s.label}</div><div class="c-stat-val">${s.value}<span class="c-stat-u">${s.unit}</span></div></div>`
  ).join('');

  const arDot = document.getElementById('ar-dot');
  arDot.style.left = dotX + 'px';
  arDot.style.top  = dotY + 'px';

  document.getElementById('ar-overlay').classList.add('active');

  requestAnimationFrame(() => {
    const card   = document.getElementById('ar-card');
    const cw     = window.innerWidth, ch = window.innerHeight;
    const cardW  = card.offsetWidth, cardH = card.offsetHeight;
    const margin = 12;

    // Posiciona o card: prefere cima se o planeta está na metade inferior
    let cardX = Math.max(margin, Math.min(cw - cardW - margin, dotX - cardW / 2));
    let cardY = dotY > ch * 0.5
      ? Math.max(margin, dotY - cardH - 60)
      : Math.min(ch - cardH - margin, dotY + 60);

    card.style.left = cardX + 'px';
    card.style.top  = cardY + 'px';

    // Linha do dot até ao card
    const lineEl = document.getElementById('ar-line');
    const endX = cardX + cardW / 2;
    const endY = cardY > dotY ? cardY : cardY + cardH;
    lineEl.setAttribute('x1', dotX); lineEl.setAttribute('y1', dotY);
    lineEl.setAttribute('x2', endX); lineEl.setAttribute('y2', endY);
  });
}

// ── FECHAR AR ────────────────────────────────────────────
function closeAR() {
  document.getElementById('ar-overlay').classList.remove('active');
  document.getElementById('hint').style.display = '';
  activePlanet = null;
  lastId       = null;
  holdCount    = 0;
  detecting    = true;
  updateStatus(null);
  if (debugMode) { ctxDisp.clearRect(0,0,cDisp.width,cDisp.height); }
  scanTimer = setInterval(analyzeFrame, CFG.scanInterval);
}

window.addEventListener('resize', () => {
  resizeDisplay();
  if (activePlanet) {
    const planet = PLANETS.find(p => p.id === activePlanet);
    if (planet) {
      const dw = cDisp.width, dh = cDisp.height;
      showAROverlay(planet, dw/2, dh/2);
    }
  }
});
</script>
