<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PlanetAR — Terra</title>

<style>
/* (mantive o teu CSS original + adições) */

/* BOTÃO FECHAR */
.close-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(255,255,255,0.08);
  border: none;
  color: white;
  font-size: 18px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
}

/* FULLSCREEN */
.info-panel.fullscreen {
  top: 0;
  bottom: 0;
}

.info-panel.fullscreen .info-card {
  margin: 0;
  border-radius: 0;
  max-height: 100dvh;
  height: 100dvh;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<!-- UI -->
<div class="scan-ui">
  <div class="top-bar">
    <div class="logo">PlanetAR</div>
    <div class="status-chip" id="statusChip">A PROCURAR</div>
  </div>
  <div class="reticle" id="reticle"></div>
  <div class="scan-hint" id="scanHint">Aponta a câmara para a Terra</div>
  <div class="scan-bar" id="scanBar">
    <span id="scanBarText">A analisar imagem...</span>
  </div>
</div>

<!-- INFO -->
<div class="info-panel" id="infoPanel">
  <div class="info-card" id="infoCard">

    <!-- BOTÃO -->
    <button id="closeBtn" class="close-btn">✕</button>

    <h1>Terra</h1>
    <p>O único planeta conhecido com vida.</p>

  </div>
</div>

<!-- START -->
<div class="start-screen" id="startScreen">
  <button id="startBtn">Iniciar Câmara</button>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const video = $('camera');
  const infoPanel = $('infoPanel');

  let isDetected = false;
  let detecting = false;

  // 🔴 PARAR CAMERA
  function stopCamera() {
    const stream = video.srcObject;
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      video.srcObject = null;
    }
  }

  // ▶️ INICIAR
  $('startBtn').addEventListener('click', async () => {
    startCamera();
  });

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      detecting = true;
      detect();

    } catch (e) {
      alert("Erro ao acessar câmera");
    }
  }

  // 🧠 DETEÇÃO (simulada simples)
  function detect() {
    if (!detecting) return;

    // SIMULA DETEÇÃO (substitui pelo teu algoritmo real)
    setTimeout(() => {
      show();
    }, 2000);
  }

  // 🌍 DETETADO
  function show() {
    if (isDetected) return;
    isDetected = true;

    detecting = false;

    // 🔴 DESLIGA CAMERA
    stopCamera();

    infoPanel.classList.add('visible');
    infoPanel.classList.add('fullscreen');
  }

  // ❌ FECHAR
  $('closeBtn').addEventListener('click', async () => {
    infoPanel.classList.remove('visible');
    infoPanel.classList.remove('fullscreen');

    isDetected = false;

    // 🔁 REINICIAR
    await startCamera();
  });

})();
</script>

</body>
</html>
